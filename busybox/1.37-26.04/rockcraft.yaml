name: busybox
base: bare
build-base: devel
version: "1.37" # just for humans. Semantic versioning is recommended
summary: A BusyBox rock
description: |
  This is a rock for BusyBox, a software suite that provides several
  Unix utilities in a single executable file.
platforms: # the platforms this rock should be built on and run on
  amd64:
  arm64:

run-user: _daemon_

parts:
  busybox:
    plugin: nil
    stage-packages:
      - base-files_chisel
      - base-files_release-info
      - busybox_bins
    override-prime: |
      craftctl default
      for cmd in $(${CRAFT_PART_INSTALL}/usr/bin/busybox --list); do
          ln -s /usr/bin/busybox ${CRAFT_PRIME}/usr/bin/$cmd
      done

  deb-security-manifest:
    plugin: make
    after: [busybox]
    source: https://github.com/canonical/rocks-security-manifest
    source-type: git
    source-branch: main
    override-prime: gen_manifest
